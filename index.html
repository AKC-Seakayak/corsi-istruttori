<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sea Kayak Trainer FICT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header id="main-header" style="display: none;">
            <div class="header-content">
                <div class="logo-large">
                    <img src="logo-fict.png" alt="FICT Logo">
                </div>
                <div class="user-info">
                    <span id="user-display-name"></span>
                    <div class="header-actions">
                        <button id="admin-btn" class="btn btn-secondary" style="display: none;">⚙️ Admin</button>
                        <button id="change-pw-btn" class="btn btn-secondary">🔑 Password</button>
                        <button id="logout-btn" class="btn btn-danger">Esci</button>
                    </div>
                </div>
            </div>
        </header>

        <div id="login-view" class="card-auth">
            <div class="auth-header">
                <img src="logo-fict.png" alt="Logo" class="auth-logo">
                <h1>Area Istruttori</h1>
                <p>Inserisci le tue credenziali per accedere</p>
            </div>
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <button id="login-btn" class="btn btn-primary btn-block">Accedi</button>
            </div>
        </div>

        <div id="courses-view" style="display: none;">
            <div class="section-header">
                <h2>I Tuoi Corsi</h2>
            </div>
            <div id="courses-list" class="grid-layout">
                </div>
        </div>

        <div id="course-students-view" style="display: none;">
            <div class="breadcrumb">
                <button id="back-to-courses-btn" class="btn btn-link">← Torna ai Corsi</button>
            </div>
            <div class="section-header">
                <h2 id="current-course-title">Dettaglio Corso</h2>
            </div>
            <div id="students-list" class="grid-layout">
                </div>
        </div>

        <div id="student-edit-view" style="display: none;">
            <div class="breadcrumb">
                <button id="back-to-students-btn" class="btn btn-link">← Torna agli Studenti</button>
            </div>
            <div class="section-header">
                <h2 id="edit-student-name">Valutazione</h2>
            </div>
            <div class="table-container">
                <table class="evaluation-table">
                    <thead>
                        <tr>
                            <th>Esercizio / Abilità</th>
                            <th width="150">Esito</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody id="evaluation-items-body">
                        </tbody>
                </table>
            </div>
            <div class="action-bar">
                <button id="save-evaluation-btn" class="btn btn-primary">Salva Valutazione</button>
            </div>
        </div>

        <div id="admin-view" style="display: none;">
            <div class="breadcrumb">
                <button id="back-from-admin-btn" class="btn btn-link">← Torna ai Corsi</button>
            </div>
            <div class="section-header">
                <h2>Gestione Utenti (Admin)</h2>
            </div>
            <div id="users-list" class="grid-layout"></div>
        </div>
    </div>

    <div id="password-modal" class="modal">
        <div class="modal-content">
            <h3>Cambia Password</h3>
            <input type="password" id="current-password" placeholder="Password attuale">
            <input type="password" id="new-password" placeholder="Nuova password">
            <input type="password" id="confirm-password" placeholder="Conferma nuova password">
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal">Annulla</button>
                <button id="confirm-password-btn" class="btn btn-primary">Aggiorna</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
